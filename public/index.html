<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0c14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TransAudio — Traduction en Direct</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">

    <!-- ═══════════════════════════════════════════════════════
         SCREEN 1 — Welcome / Language Selection
         ═══════════════════════════════════════════════════════ -->
    <section id="screen-welcome" class="screen active" aria-label="Sélection de la langue">
      <div class="card">
        <!-- Cross icon -->
        <div class="cross-icon" aria-hidden="true"></div>

        <!-- Header -->
        <p class="church-name" id="church-name">Notre Église</p>
        <h1 class="main-title">Traduction en Direct</h1>
        <p class="subtitle">Sélectionnez votre langue pour écouter le message traduit en temps réel.</p>

        <!-- Language buttons (populated dynamically, fallback below) -->
        <div class="lang-grid" id="lang-grid">
          <!-- JS will populate this. Static fallback: -->
          <button class="lang-btn" data-lang="en" type="button">
            <span class="flag" aria-hidden="true">🇬🇧</span>
            <span>English</span>
          </button>
        </div>

        <!-- Waiting banner (shown when no stream active) -->
        <div class="waiting-banner" id="waiting-banner">
          <span class="dot-pulse" aria-hidden="true"></span>
          <span>La traduction n'est pas encore active. Veuillez patienter…</span>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN 2 — Listening
         ═══════════════════════════════════════════════════════ -->
    <section id="screen-listening" class="screen" aria-label="Écoute en cours">
      <div class="card listening-card">

        <!-- Listening indicator -->
        <div class="listening-label">
          <span class="live-dot" aria-hidden="true"></span>
          <span>En écoute</span>
        </div>

        <h2 class="listening-lang" id="listening-lang">English</h2>

        <!-- Audio wave visualizer -->
        <div class="wave-container" id="wave-container">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>

        <!-- Volume -->
        <div class="volume-row">
          <span class="volume-icon" aria-hidden="true">🔈</span>
          <input
            type="range"
            id="volume-slider"
            class="volume-slider"
            min="0" max="100" value="80"
            aria-label="Volume"
          />
          <span class="volume-icon" aria-hidden="true">🔊</span>
        </div>

        <!-- Stop button -->
        <button class="btn-stop" id="btn-stop" type="button">
          ⏹ Arrêter
        </button>

        <!-- Connection status -->
        <div class="connection-status" id="connection-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Connecté</span>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN 3 — Connection Lost
         ═══════════════════════════════════════════════════════ -->
    <section id="screen-reconnect" class="screen" aria-label="Reconnexion">
      <div class="card reconnect-card">
        <div class="cross-icon" aria-hidden="true"></div>
        <h2>Connexion perdue</h2>
        <p>Reconnexion en cours… veuillez patienter.</p>
        <div class="spinner" aria-label="Chargement"></div>
      </div>
    </section>

  </div><!-- /app -->

  <!-- Scripts -->
  <script src="audio-player.js"></script>
  <script src="app.js"></script>
</body>
</html>
